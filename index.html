<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cefemex - Simulador de Empeño</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="app-container">

    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <a href="/" class="brand">
          <div class="brand-icon"><span>C</span></div>
          <span class="brand-name">Cefemex</span>
        </a>
        <nav class="breadcrumb" id="breadcrumb" aria-label="Navegación"></nav>
      </div>
    </header>

    <!-- Step Indicator -->
    <div class="step-indicator" id="step-indicator">
      <div class="step-group">
        <div class="step-circle active" data-step="0">1</div>
        <span class="step-label active">Categoría</span>
      </div>
      <div class="step-connector"></div>
      <div class="step-group">
        <div class="step-circle" data-step="1">2</div>
        <span class="step-label">Detalles</span>
      </div>
      <div class="step-connector"></div>
      <div class="step-group">
        <div class="step-circle" data-step="2">3</div>
        <span class="step-label">Resultado</span>
      </div>
    </div>

    <!-- Main Card -->
    <main class="main-card" id="main-panel">
      <div class="hero-text" id="hero-text">
        <h1 class="hero-title">Simulador de Empeño</h1>
        <p class="hero-subtitle">Cotiza el préstamo de tus artículos en minutos.</p>
      </div>

      <div id="step-content"></div>

      <div id="result-section" style="display:none">
        <div id="loan-display"></div>
        <div id="plans-comparison"></div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>La información proporcionada en este simulador es para fines ilustrativos, está sujeta a cambios y no genera obligación alguna para Cefemex.</p>
      <a href="javascript:void(0)" id="link-conditions">Leer condiciones del simulador</a>
    </footer>

  </div>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="modal"></div>

  <script src="js/catalogs.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
